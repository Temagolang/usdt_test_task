version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/repo/rates/postgres/queries/"
    schema: "internal/migration/postgres/"
    gen:
      go:
        package: "postgres"
        out: "internal/repo/rates/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
